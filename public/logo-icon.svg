<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frame-grad" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="slash-grad" x1="58" y1="19" x2="38" y2="77" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#cc2020"/>
      <stop offset="100%" stop-color="#6b0000"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3a3a3a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- card -->
  <rect x="2" y="2" width="92" height="92" rx="21" fill="url(#frame-grad)" filter="url(#shadow)"/>
  <!-- shine -->
  <rect x="2" y="2" width="92" height="46" rx="21" fill="url(#shine)" opacity="0.4"/>
  <!-- border -->
  <rect x="2" y="2" width="92" height="92" rx="21" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- top highlight -->
  <path d="M23 3 Q48 2 73 3" stroke="#555555" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- left bracket -->
  <path d="M31 25 L21 25 L21 71 L31 71" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- right bracket -->
  <path d="M65 25 L75 25 L75 71 L65 71" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- slash glow -->
  <line x1="58" y1="23" x2="38" y2="73" stroke="#8B1A1A" stroke-width="5" stroke-linecap="round" opacity="0.4" filter="url(#glow-red)"/>
  <!-- slash -->
  <line x1="58" y1="23" x2="38" y2="73" stroke="url(#slash-grad)" stroke-width="3" stroke-linecap="round"/>
  <!-- C arc -->
  <path d="M56 33 C49 27 37 29 33 41 C29 53 36 64 49 66" stroke="#d0d0d0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- C dots -->
  <circle cx="56" cy="33" r="2.5" fill="#e8e8e8"/>
  <circle cx="49" cy="66" r="2.5" fill="#e8e8e8"/>
</svg>
